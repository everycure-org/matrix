drug_list:
  name_resolver:
    base_url: https://name-resolution-sri.renci.org
    path: /lookup?string={name}&autocomplete=False&highlighting=False&offset=0&limit=10
    parallelism: 60
    accepted_drug_categories:
      - biolink:SmallMolecule
      - biolink:Drug
      - biolink:MolecularEntity
      - biolink:ChemicalEntity
      - biolink:PhysicalEssence
      - biolink:ChemicalOrDrugOrTreatment
      - biolink:ChemicalMixture
      - biolink:Protein
      - biolink:Polypeptide

  node_normalizer:
    base_url: https://nodenormalization-sri.renci.org
    path: /1.5/get_normalized_nodes

  drug_exception_list:
    # Diazoxide choline was approved in 2025; none of the KGs will have it within the near future so it currently maps to Diazoxide despite those two being distinct entities. This leads to duplicates -> pipeline throws error. Decision was made to keep it but to drop this specific duplicate
    - diazoxide choline 

  release_columns:
    - id
    - name
    - translator_id
    - drugbank_id
    - synonyms
    - aggregated_with
    - drug_class
    - therapeutic_area
    - drug_function
    - drug_target
    - approved_usa
    - is_antipsychotic
    - is_sedative
    - is_antimicrobial
    - is_glucose_regulator
    - is_chemotherapy
    - is_steroid
    - is_analgesic
    - is_cardiovascular
    - is_cell_therapy
    - atc_main
    - atc_level_1
    - atc_level_2
    - atc_level_3
    - atc_level_4
    - atc_level_5
    - l1_label
    - l2_label
    - l3_label
    - l4_label
    - l5_label
    - deleted
    - deleted_reason
    - new_id
    - is_fda_generic_drug

  fda:
    curated_drug_list_columns_to_use_for_matching:
      - name
      - synonyms
    curated_drug_list_columns_to_use_for_matching_for_multiple_ingredient_or_substance_drugs:
      - available_in_combo_with
    fda_drug_list_columns_to_use_for_matching:
      - openfda.substance_name
      - products.active_ingredients.name
    filter_curated_drug_list_params:
      approved_usa: APPROVED

  fda_purple_book:
    generic_status_bla_type:
      - "351(k) Interchangeable"
      - "351(k) Biosimilar"

  # Configuration for openFDA label queries (used by core_entities.utils.fda_labels_utils).
  # In a future pipeline, pass this dict directly as `params:drug_list.fda_labels`.
  fda_labels:
    api:
      api_url: https://api.fda.gov/drug/label.json
      api_key_env_var: FDA_API_KEY
      max_concurrent: 5
      retry_attempts: 3
      retry_backoff_seconds: [1, 3, 7]
      request_timeout_seconds: 15
      result_limit: 1

    monograph_application_prefix: M

    query:
      substance_name_field: openfda.substance_name
      application_number_field: openfda.application_number
      application_number_prefix: M
      boolean_operator: AND
      uppercase_substance_name: true
      # Add/remove extra query constraints without code changes.
      additional_clauses: []
