known_entity_removal.model_output.known_entity_matrix:
  type: everycure.datasets.kedro.DataCatalogDataset
  group: known_entity_removal
  dataset: known_entity_matrix
  engine: spark
  save_args:
    catalog_args:
      version: ${globals:release_version_semver}
      message: Run of the known_entity_removal pipeline from main. Dataset based lookup with MONDO expansion. Done after KGML-xDTD contraindication
      location:
        format: parquet
        uri: ${globals:paths.known_entity_removal}/known_entity_matrix
        type: gcs
      description: Known entity predictions, generated in the known_entity_removal pipeline.
      owner:
        name: Piotr Kaniewski # temporary owner until we have a proper gitops in place
        email: piotr@everycure.org
      origin:
        system: matrix
        url: https://github.com/everycure-org/matrix
        
