filtering:
  node_filters:
    filter_sources:
      _object: matrix.pipelines.filtering.filters.KeepRowsContaining
      column: upstream_data_source
      keep_list:
        - rtxkg2
        - ec_medical
        - robokop

    filter_node_labels:
        _object: matrix.pipelines.filtering.filters.RemoveRowsByColumn
        column: category
        remove_list:
          - biolink:Activity
          - biolink:Agent
          - biolink:Behaviour
          - biolink:ClinicalIntervention
          - biolink:Cohort
          - biolink:Device
          - biolink:EnvironmentalFeature
          - biolink:EnvironmentalProcess
          - biolink:Event
          - biolink:Food
          - biolink:GeographicLocation
          - biolink:Human
          - biolink:IndividualOrganism
          - biolink:InformationContentEntity
          - biolink:InformationResource
          - biolink:LifeStage
          - biolink:MaterialSample
          - biolink:NamedThing
          - biolink:OrganismAttribute 
          - biolink:OrganismTaxon
          - biolink:Phenomenon
          - biolink:PhysicalEntity
          - biolink:PopulationOfIndividualOrganisms
          - biolink:Procedure
          - biolink:Publication
          - biolink:Treatment

  edge_filters:
    deduplicate_edges:
      _object: matrix.pipelines.filtering.filters.DeduplicateEdges
#      Collapses duplicate (subject, predicate, object) triples from different primary knowledge
#      sources into a single edge, merging upstream_data_source arrays and capturing per-source
#      qualifier detail in source_edge_properties. Enabled by default.
    
    filter_sources:
      _object: matrix.pipelines.filtering.filters.KeepRowsContaining
      column: upstream_data_source
      keep_list:
        - rtxkg2
        - ec_medical
        - robokop

    filter_biolink_edges:
      _object: matrix.pipelines.filtering.filters.BiolinkDeduplicateEdges

    filter_triples:
      _object: matrix.pipelines.filtering.filters.TriplePattern
      triples_to_exclude:
       - ["biolink:Drug", "biolink:interacts_with", "biolink:Drug"]
       - ["biolink:Drug", "biolink:interacts_with", "biolink:SmallMolecule"]
       - ["biolink:SmallMolecule", "biolink:interacts_with", "biolink:Drug"]
       - ["biolink:Drug", "biolink:coexists_with", "biolink:Drug"]
      # - ["biolink:Drug", "biolink:subclass_of", "biolink:Drug"]
      # - ["biolink:Drug", "biolink:has_part", "biolink:Drug"]
      # - ["biolink:Drug", "biolink:related_to", "biolink:Drug"]
      # - ["biolink:Drug", "biolink:close_match", "biolink:Drug"]