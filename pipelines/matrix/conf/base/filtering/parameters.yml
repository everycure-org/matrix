  edge_filters:
    deduplicate_edges:
      _object: matrix.pipelines.filtering.filters.DeduplicateEdges
#      Collapses duplicate (subject, predicate, object) triples from different primary knowledge
#      sources into a single edge, merging upstream_data_source arrays and capturing per-source
#      qualifier detail in source_edge_properties. Enabled by default.
    
    filter_sources:
      _object: matrix.pipelines.filtering.filters.KeepRowsContaining
      column: upstream_data_source
      keep_list:
        - rtxkg2
        - robokop
        - primekg

    filter_biolink_edges:
      _object: matrix.pipelines.filtering.filters.BiolinkDeduplicateEdges

